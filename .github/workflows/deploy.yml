name: 自动发布到腾讯云
on:
  push:
    branches: [ master ]
  workflow_dispatch:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 下载代码
        uses: actions/checkout@v4
      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: 安装依赖
        run: npm install
      - name: 构建项目
        run: npm run build
      - name: 安装 sshpass
        run: sudo apt-get install -y sshpass
      - name: 部署到腾讯云
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -x  # 启用详细输出
          
          echo "开始部署到腾讯云..."
          echo "服务器地址: $DEPLOY_HOST"
          echo "用户名: $DEPLOY_USER"
          echo "部署路径: $DEPLOY_PATH"
          
          # 检查 dist 目录是否存在
          if [ ! -d "./dist" ]; then
            echo "错误: dist 目录不存在，请检查构建过程"
            exit 1
          fi
          
          # 检查 dist 目录是否有文件
          if [ -z "$(ls -A ./dist)" ]; then
            echo "错误: dist 目录为空，请检查构建过程"
            exit 1
          fi
          
          # 显示 dist 目录内容
          echo "dist 目录内容:"
          ls -la ./dist
          
          # 尝试连接服务器并创建部署目录
          echo "=== 尝试连接服务器 ==="
          sshpass -p "$DEPLOY_PASSWORD" ssh -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_HOST "echo 'SSH 连接成功'"
          
          if [ $? -eq 0 ]; then
            echo "=== SSH 连接成功，创建部署目录 ==="
            sshpass -p "$DEPLOY_PASSWORD" ssh -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_HOST "mkdir -p $DEPLOY_PATH"
            
            if [ $? -eq 0 ]; then
              echo "=== 目录创建成功，开始上传文件 ==="
              # 上传文件
              sshpass -p "$DEPLOY_PASSWORD" scp -r ./dist/* $DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH
              
              if [ $? -eq 0 ]; then
                echo "=== 部署成功！==="
                # 验证部署结果
                sshpass -p "$DEPLOY_PASSWORD" ssh -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_HOST "ls -la $DEPLOY_PATH"
              else
                echo "=== 错误: 文件上传失败 ==="
                exit 1
              fi
            else
              echo "=== 错误: 无法创建部署目录 ==="
              exit 1
            fi
          else
            echo "=== 错误: 无法连接到服务器 ==="
            echo "请检查以下内容:"
            echo "1. 服务器地址 ($DEPLOY_HOST) 是否正确"
            echo "2. 用户名 ($DEPLOY_USER) 是否正确"
            echo "3. 密码是否正确"
            echo "4. 服务器是否开启了 SSH 服务"
            echo "5. 服务器防火墙是否允许 SSH 连接"
            exit 1
          fi
          
          set +x  # 禁用详细输出
